<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Parent Report | Master Maths</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet"/>
<style>
:root{--pink:#FF2D78;--dark:#0D0D1A;--dark2:#16162A;--dark3:#1E1E35;--text:#E8E8F5;--muted:#8888AA;--green:#00E5A0;--blue:#4D9EFF;--purple:#9B6DFF;--yellow:#FFD166;}
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'DM Sans',sans-serif;background:var(--dark);color:var(--text);min-height:100vh;}
.topbar{display:flex;align-items:center;justify-content:space-between;padding:14px 32px;background:var(--dark2);border-bottom:1px solid rgba(255,255,255,0.07);}
.back-btn{color:var(--muted);text-decoration:none;font-size:0.88rem;font-weight:500;transition:color 0.2s;}
.back-btn:hover{color:var(--pink);}
.topbar h2{font-family:'Syne',sans-serif;font-size:1rem;font-weight:800;}
.container{max-width:820px;margin:0 auto;padding:40px 24px;}
h1{font-family:'Syne',sans-serif;font-size:1.8rem;font-weight:800;margin-bottom:8px;text-align:center;}
.sub{color:var(--muted);font-size:0.92rem;margin-bottom:36px;line-height:1.6;text-align:center;}
.login-card{background:var(--dark2);border:1px solid rgba(255,255,255,0.07);border-radius:20px;padding:40px;max-width:440px;margin:0 auto;}
.login-card h3{font-family:'Syne',sans-serif;font-weight:800;font-size:1.3rem;margin-bottom:8px;}
.login-card p{color:var(--muted);font-size:0.88rem;margin-bottom:28px;}
.form-group{margin-bottom:18px;}
.form-group label{display:block;font-size:0.8rem;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:0.07em;margin-bottom:8px;}
.form-group input,.form-group select{width:100%;background:var(--dark3);border:1px solid rgba(255,255,255,0.1);border-radius:12px;padding:13px 16px;color:var(--text);font-family:'DM Sans',sans-serif;font-size:0.9rem;outline:none;transition:border-color 0.3s;}
.form-group input:focus,.form-group select:focus{border-color:var(--pink);}
.form-group select option{background:var(--dark2);}
.btn-primary{background:var(--pink);color:#fff;padding:12px 28px;border-radius:50px;font-weight:600;font-size:0.92rem;cursor:pointer;border:none;transition:all 0.3s;width:100%;}
.btn-primary:hover{transform:translateY(-2px);box-shadow:0 8px 24px rgba(255,45,120,0.35);}
.btn-sm{padding:8px 20px;font-size:0.82rem;border-radius:50px;font-weight:600;cursor:pointer;border:1px solid rgba(255,255,255,0.12);background:transparent;color:var(--muted);transition:all 0.2s;}
.btn-sm:hover{border-color:var(--pink);color:var(--pink);}
.btn-print{background:var(--pink);color:#fff;padding:10px 24px;border-radius:50px;font-weight:600;font-size:0.88rem;cursor:pointer;border:none;transition:all 0.3s;}
.btn-print:hover{transform:translateY(-2px);box-shadow:0 6px 20px rgba(255,45,120,0.35);}
.report-header{background:linear-gradient(135deg,rgba(255,45,120,0.12),rgba(155,109,255,0.12));border:1px solid rgba(255,45,120,0.2);border-radius:20px;padding:28px 32px;margin-bottom:28px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:12px;}
.student-info h2{font-family:'Syne',sans-serif;font-size:1.4rem;font-weight:800;margin-bottom:4px;text-align:left;}
.student-info p{color:var(--muted);font-size:0.88rem;}
.report-badge{background:rgba(0,229,160,0.12);border:1px solid rgba(0,229,160,0.25);border-radius:50px;padding:6px 16px;font-size:0.78rem;color:var(--green);font-weight:600;}
.stats-row{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:24px;}
.stat-box{background:var(--dark2);border:1px solid rgba(255,255,255,0.07);border-radius:14px;padding:18px;text-align:center;}
.stat-box .n{font-family:'Syne',sans-serif;font-size:1.6rem;font-weight:800;margin-bottom:4px;}
.stat-box .l{font-size:0.72rem;color:var(--muted);line-height:1.4;}
.card{background:var(--dark2);border:1px solid rgba(255,255,255,0.07);border-radius:16px;padding:24px;margin-bottom:18px;}
.card h4{font-family:'Syne',sans-serif;font-weight:700;margin-bottom:16px;font-size:1rem;}
.metric-row{display:flex;justify-content:space-between;align-items:center;padding:9px 0;border-bottom:1px solid rgba(255,255,255,0.05);font-size:0.88rem;}
.metric-row:last-child{border:none;}
.metric-label{color:var(--muted);}
.metric-val{font-weight:600;}
.up{color:var(--green);}
.prog-bar{height:6px;background:rgba(255,255,255,0.07);border-radius:50px;margin-top:4px;overflow:hidden;}
.prog-fill{height:100%;border-radius:50px;}
.ai-summary{background:rgba(77,158,255,0.06);border:1px solid rgba(77,158,255,0.2);border-radius:16px;padding:24px;margin-bottom:18px;}
.ai-tag{display:inline-flex;align-items:center;gap:6px;background:rgba(77,158,255,0.12);color:var(--blue);font-size:0.72rem;font-weight:700;padding:4px 12px;border-radius:50px;margin-bottom:14px;}
.ai-summary p{color:var(--text);font-size:0.9rem;line-height:1.7;}
.ai-list{list-style:none;margin-top:12px;display:flex;flex-direction:column;gap:8px;}
.ai-list li{font-size:0.88rem;color:var(--muted);display:flex;gap:8px;}
.ai-list li::before{content:'&bull;';color:var(--blue);}
.loading-box{text-align:center;padding:60px 24px;}
.spinner{width:48px;height:48px;border:3px solid rgba(255,45,120,0.15);border-top-color:var(--pink);border-radius:50%;animation:spin 0.8s linear infinite;margin:0 auto 20px;}
@keyframes spin{to{transform:rotate(360deg);}}
@keyframes fadeUp{from{opacity:0;transform:translateY(12px);}to{opacity:1;transform:translateY(0);}}
.fade-in{animation:fadeUp 0.4s ease;}
@media(max-width:600px){.stats-row{grid-template-columns:1fr 1fr;}.report-header{flex-direction:column;}}
</style>
</head>
<body>
<div class="topbar">
  <a class="back-btn" href="index.html">&larr; Back to Home</a>
  <h2>Parent Progress Report</h2>
  <div style="width:80px;"></div>
</div>
<div class="container">
  <div id="mainContent">
    <h1>Parent Dashboard</h1>
    <p class="sub">Enter your child's details to view their latest AI-generated progress report.</p>
    <div class="login-card">
      <h3>View Report</h3>
      <p>Enter details to access your child's personalised report.</p>
      <div class="form-group">
        <label>Student Name</label>
        <input type="text" id="sName" placeholder="e.g. Arjun Ramesh"/>
      </div>
      <div class="form-group">
        <label>Class</label>
        <select id="sClass">
          <option value="">Select Class</option>
          <option>Class 9</option>
          <option>Class 10</option>
          <option>Class 11</option>
          <option>Class 12</option>
        </select>
      </div>
      <div class="form-group">
        <label>Report Week</label>
        <select id="sWeek">
          <option>Week of Mar 10-16, 2026</option>
          <option>Week of Mar 3-9, 2026</option>
          <option>Week of Feb 24 - Mar 2, 2026</option>
        </select>
      </div>
      <div class="form-group">
        <label>Parent Mobile (for verification)</label>
        <input type="tel" id="sMobile" placeholder="+91 XXXXX XXXXX"/>
      </div>
      <button class="btn-primary" onclick="loadReport()">View Progress Report &rarr;</button>
    </div>
  </div>
</div>
<script src="api.js"></script>
<script src="dashboard-auth.js"></script>
<script>
async function loadReport() {
  const name = document.getElementById('sName').value || 'Student';
  const cls = document.getElementById('sClass').value || 'Class 11';
  const week = document.getElementById('sWeek').value;

  document.getElementById('mainContent').innerHTML =
    '<div class="loading-box"><div class="spinner"></div><p>AI is generating ' + name + '\'s progress report...<br/><span style="font-size:0.8rem;">Analysing attendance, scores and topic performance</span></p></div>';

  const demo = {
    attendance: 22, totalDays: 24,
    testsCompleted: 6, testsTotal: 8,
    avgScore: 74, prevScore: 66,
    rank: 4, batchSize: 30,
    topics: [
      {name:'Algebra', score:85, prev:78},
      {name:'Trigonometry', score:62, prev:55},
      {name:'Calculus', score:48, prev:50},
      {name:'Statistics', score:79, prev:70},
      {name:'Probability', score:55, prev:48}
    ]
  };

  try {
    const data = await API.getParentAIReport();
    renderReport(name, cls, week, demo, data.aiReport || data);
  } catch(e) {
    renderReport(name, cls, week, demo, {
      overallSummary: name + ' has had a productive week with notable improvement in Algebra and Statistics. Attendance is excellent at ' + demo.attendance + '/' + demo.totalDays + ' days.',
      highlights: ['Score improved by 8% compared to last week', 'Strong performance in Algebra (85%)'],
      concerns: ['Calculus needs a bit more attention this coming week'],
      parentTips: ['Encourage 30 minutes of Calculus practice daily', 'Check the weak topic alert for recommended exercises'],
      nextWeekFocus: 'Focus on Calculus integration concepts and timed practice tests.'
    });
  }
}

function renderReport(name, cls, week, demo, ai) {
  const attPct = Math.round(demo.attendance / demo.totalDays * 100);
  const improvement = demo.avgScore - demo.prevScore;
  const impColor = improvement >= 0 ? 'var(--green)' : 'var(--pink)';
  const impArrow = improvement >= 0 ? '&uarr;' + improvement + '%' : '&darr;' + Math.abs(improvement) + '%';

  let topicsHTML = demo.topics.map(t => {
    const diff = t.score - t.prev;
    const barCol = t.score >= 75 ? 'var(--green)' : t.score >= 55 ? 'var(--yellow)' : 'var(--pink)';
    const arrow = diff > 0 ? '<span style="color:var(--green);font-size:0.78rem;">&uarr;' + diff + '%</span>' : diff < 0 ? '<span style="color:var(--pink);font-size:0.78rem;">&darr;' + Math.abs(diff) + '%</span>' : '';
    return '<div style="margin-bottom:12px;"><div style="display:flex;justify-content:space-between;font-size:0.85rem;margin-bottom:4px;"><span>' + t.name + '</span><span style="display:flex;gap:6px;align-items:center;font-weight:600;">' + t.score + '% ' + arrow + '</span></div><div class="prog-bar"><div class="prog-fill" style="width:' + t.score + '%;background:' + barCol + '"></div></div></div>';
  }).join('');

  let html = '<div class="fade-in">';
  html += '<div class="report-header"><div class="student-info"><h2>' + name + '</h2><p>' + cls + ' &bull; ' + week + '</p></div><div class="report-badge">AI-Generated Report</div></div>';

  html += '<div class="stats-row">';
  html += '<div class="stat-box"><div class="n" style="color:' + impColor + '">' + demo.avgScore + '%</div><div class="l">Avg Score ' + impArrow + ' vs last week</div></div>';
  html += '<div class="stat-box"><div class="n" style="color:var(--green)">' + attPct + '%</div><div class="l">Attendance ' + demo.attendance + '/' + demo.totalDays + ' days</div></div>';
  html += '<div class="stat-box"><div class="n">' + demo.testsCompleted + '/' + demo.testsTotal + '</div><div class="l">Tests Completed</div></div>';
  html += '<div class="stat-box"><div class="n" style="color:var(--blue)">#' + demo.rank + '</div><div class="l">Rank in batch of ' + demo.batchSize + '</div></div>';
  html += '</div>';
  if (demo.weeklySummary) {
    html += '<div class="card"><h4>Weekly Parent Summary</h4>';
    html += '<div class="metric-row"><span class="metric-label">Attendance</span><span class="metric-value">' + (demo.weeklySummary.attendance?.present || 0) + '/' + (demo.weeklySummary.attendance?.total || 0) + ' (' + (demo.weeklySummary.attendance?.percentage || 0) + '%)</span></div>';
    html += '<div class="metric-row"><span class="metric-label">Schedule Completion</span><span class="metric-value">' + (demo.weeklySummary.timetable?.completed || 0) + '/' + (demo.weeklySummary.timetable?.total || 0) + ' (' + (demo.weeklySummary.timetable?.percentage || 0) + '%)</span></div>';
    html += '<div class="metric-row"><span class="metric-label">Daily MCQ Accuracy</span><span class="metric-value">' + (demo.weeklySummary.mcq?.correct || 0) + '/' + (demo.weeklySummary.mcq?.attempted || 0) + ' correct � ' + (demo.weeklySummary.mcq?.percentage || 0) + '%</span></div>';
    html += '</div>';
  }

  if ((demo.weakTopics || []).length || (demo.strongTopics || []).length) {
    html += '<div class="card"><h4>Topic Focus This Week</h4>';
    if ((demo.weakTopics || []).length) {
      html += '<div class="metric-row"><span class="metric-label">Weak Topics</span><span class="metric-value">' + demo.weakTopics.join(', ') + '</span></div>';
    }
    if ((demo.strongTopics || []).length) {
      html += '<div class="metric-row"><span class="metric-label">Strong Topics</span><span class="metric-value">' + demo.strongTopics.join(', ') + '</span></div>';
    }
    html += '</div>';
  }

  if ((demo.recentMcqs || []).length) {
    html += '<div class="card"><h4>Recent Daily MCQs</h4>';
    demo.recentMcqs.forEach(function(mcq) {
      html += '<div class="metric-row"><span class="metric-label">' + (mcq.title || 'Daily MCQ') + '</span><span class="metric-value" style="color:' + (mcq.is_correct ? 'var(--green)' : 'var(--pink)') + ';">' + (mcq.is_correct ? 'Completed correctly' : 'Completed - needs review') + '</span></div>';
    });
    html += '</div>';
  }
  if ((demo.weeklyTests || []).length) {
    html += '<div class="card"><h4>Weekly Test Entries</h4>';
    demo.weeklyTests.slice(0, 5).forEach(function(test) {
      html += '<div class="metric-row"><span class="metric-label">' + test.title + ' � ' + (test.test_date || '') + '</span><span class="metric-value">' + test.marks_obtained + '/' + test.total_marks + '</span></div>';
    });
    html += '</div>';
  }

  if ((demo.questionPapers || []).length) {
    html += '<div class="card"><h4>Question Papers</h4>';
    demo.questionPapers.slice(0, 5).forEach(function(paper) {
      html += '<div class="metric-row"><span class="metric-label">' + paper.title + '</span><a class="metric-value" href="' + paper.resource_url + '" target="_blank" rel="noreferrer">Open</a></div>';
    });
    html += '</div>';
  }

  if (demo.feeSummary) {
    html += '<div class="card"><h4>Fees</h4>';
    html += '<div class="metric-row"><span class="metric-label">Total Fee</span><span class="metric-value">Rs ' + (demo.feeSummary.totalDue || 0) + '</span></div>';
    html += '<div class="metric-row"><span class="metric-label">Paid</span><span class="metric-value">Rs ' + (demo.feeSummary.totalPaid || 0) + '</span></div>';
    html += '<div class="metric-row"><span class="metric-label">Pending</span><span class="metric-value">Rs ' + (demo.feeSummary.pending || 0) + '</span></div>';
    (demo.feeSummary.payments || []).slice(0, 5).forEach(function(payment) {
      html += '<div class="metric-row"><span class="metric-label">Payment on ' + payment.paid_on + '</span><span class="metric-value">Rs ' + payment.amount_paid + '</span></div>';
    });
    html += '</div>';
  }



  html += '<div class="ai-summary"><div class="ai-tag">AI Summary</div><p>' + (ai.overallSummary || '') + '</p>';
  html += '<ul class="ai-list">';
  (ai.highlights || []).forEach(h => { html += '<li>' + h + '</li>'; });
  (ai.concerns || []).forEach(c => { html += '<li style="color:var(--yellow);">' + c + '</li>'; });
  html += '</ul></div>';

  html += '<div class="card"><h4>Topic-wise Performance</h4>' + topicsHTML + '</div>';

  html += '<div class="card"><h4>How You Can Help (Tips for Parents)</h4>';
  (ai.parentTips || []).forEach(t => {
    html += '<div class="metric-row"><span class="metric-label">&rarr;</span><span style="font-size:0.88rem;">' + t + '</span></div>';
  });
  html += '</div>';

  html += '<div class="card"><h4>Next Week\'s Focus</h4><p style="color:var(--muted);font-size:0.9rem;line-height:1.7;">' + (ai.nextWeekFocus || '') + '</p></div>';

  html += '<div style="text-align:center;margin-top:28px;display:flex;gap:12px;justify-content:center;flex-wrap:wrap;">';
  html += '<button class="btn-sm" onclick="location.reload()">View Another Student</button>';
  html += '<button class="btn-print" onclick="window.print()">Download / Print Report</button>';
  html += '</div></div>';

  document.getElementById('mainContent').innerHTML = html;
}
</script>
</body>
</html>
